version: 2

updates:
    # JavaScript / TypeScript dependencies
    - package-ecosystem: "npm"
      directory: "/packages/js"
      schedule:
          interval: "weekly"
          day: "monday"
      labels:
          - "dependencies"
          - "js"
      commit-message:
          prefix: "chore(js)"
      reviewers:
          - "felipesauer"
      groups:
          dev-dependencies:
              dependency-type: "development"
              update-types:
                  - "minor"
                  - "patch"
          production-dependencies:
              dependency-type: "production"

    # PHP / Composer dependencies
    - package-ecosystem: "composer"
      directory: "/packages/php"
      schedule:
          interval: "weekly"
          day: "monday"
      labels:
          - "dependencies"
          - "php"
      commit-message:
          prefix: "chore(php)"
      reviewers:
          - "felipesauer"
      groups:
          dev-dependencies:
              dependency-type: "development"
              update-types:
                  - "minor"
                  - "patch"
          production-dependencies:
              dependency-type: "production"

    # Root tooling (husky, commitlint, lint-staged, prettier)
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
      labels:
          - "dependencies"
          - "ci"
      commit-message:
          prefix: "chore(deps)"
      reviewers:
          - "felipesauer"
      groups:
          root-tooling:
              dependency-type: "development"
              update-types:
                  - "minor"
                  - "patch"

    # GitHub Actions
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
      labels:
          - "dependencies"
          - "ci"
      commit-message:
          prefix: "chore(ci)"
      reviewers:
          - "felipesauer"
