name: Docs CI

on:
    push:
        branches: [main]
        paths:
            - 'docs/**'
            - '.github/workflows/docs-ci.yml'
    pull_request:
        branches: [main]
        paths:
            - 'docs/**'
            - '.github/workflows/docs-ci.yml'
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        name: VitePress Build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Check VitePress config exists
              id: check
              run: |
                  if [[ -f docs/.vitepress/config.ts || -f docs/.vitepress/config.js ]]; then
                    echo "has_docs=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "::notice::No docs/.vitepress/config found — skipping build"
                  fi

            - name: Setup Node.js
              if: steps.check.outputs.has_docs == 'true'
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 24

            - name: Install dependencies
              if: steps.check.outputs.has_docs == 'true'
              run: npm install

            - name: Build VitePress site
              if: steps.check.outputs.has_docs == 'true'
              run: npm run docs:build

            - name: Upload artifact
              if: steps.check.outputs.has_docs == 'true'
              uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
              with:
                  path: docs/.vitepress/dist

    deploy:
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && needs.build.result == 'success'
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
